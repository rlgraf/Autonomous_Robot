battery_node:
  ros__parameters:
    # Battery
    battery_capacity_ah: 1.0
    idle_drain_a: 3.0
    move_drain_per_ms: 10.0
    turn_drain_per_rads: 5.0
    battery_voltage: 12.0
    publish_rate_hz: 10.0

    # Charging
    charge_rate_a: 100.0
    charging_radius: 0.75
    stationary_thresh: 0.1


    # Charging station visual colors [r, g, b, a]
    # ambient  = color in shadow
    # diffuse  = main surface color in direct light
    # emissive = glow color regardless of lighting (0 = no glow)
    color_idle:
      ambient:  [0.0, 0.8, 0.0, 1.0] # 
      diffuse:  [0.0, 0.8, 0.0, 1.0]
      specular: [0.0, 0.8, 0.0, 1.0]   # no glow — station is inactive

    color_charging:
      ambient:  [0.0, 0.0, 0.9, 1.0]  # 
      diffuse:  [0.0, 0.0, 0.9, 1.0]
      specular: [0.0, 0.0, 0.9, 1.0]   # 

    color_full:
      ambient:  [0.0, 0.4, 0.4, 0.2] # green
      diffuse:  [0.0, 0.9, 0.9, 0.2]
      specular: [0.0, 1.0, 1.0, 1.0]   # slight green glow

    # Charging station positions [[x1,y1], [x2,y2], ...]
    charging_stations:
      - [0, 4]
      - [0, -4]
      - [49.0, 4.0]
      - [49.0, -4.0]
      - [-49.0, -4.0]

# ─────────────────────────────────────────────────────────────────────────────
# Auto Recharge Navigation
#
# return_mode: 'threshold' | 'prediction'
#
#   threshold  – trigger when battery_pct < low_battery_threshold.
#
#   prediction – trigger when the estimated Ah needed to reach the nearest
#                station exceeds current charge remaining.
#                drain_per_metre is derived automatically from the battery
#                node's own drain parameters (idle_drain_a, move_drain_per_ms,
#                turn_drain_per_rads) — no manual tuning required.
#
#                prediction_cruise_fraction controls what fraction of max_linear
#                is used as the assumed travel speed for the energy estimate.
#                0.6 means the robot is assumed to travel at 60% of max speed,
#                which accounts for acceleration, curves, and slow final approach.
#                Increase toward 1.0 on open maps; decrease on cluttered maps.
#
#                prediction_turn_fraction is the fraction of max_angular assumed
#                to be used for heading corrections during the trip.
#                It models the turning cost: a value of 0.3 means the robot
#                spends ~30% of max turn rate correcting its heading on average.
#
#                safety_margin_ah is a flat Ah buffer added on top of the
#                predicted travel cost. It hedges against detours caused by
#                obstacle avoidance, which add unplanned distance.
#
# full_speed_angle – heading error below which robot drives at full speed (rad)
# stop_drive_angle – heading error above which robot stops translating (rad)
#   Between the two, forward speed blends linearly from full → zero.
# ─────────────────────────────────────────────────────────────────────────────
auto_recharge_node:
  ros__parameters:
    arrived_radius:        0.2   # m
    max_linear:            5.0    # m/s
    max_angular:           5.0    # rad/s
    k_linear:              0.4    # proportional gain: forward speed
    k_angular:             1.6    # proportional gain: rotation speed
    full_speed_angle:      0.20   # rad (~11°)
    stop_drive_angle:      0.60   # rad (~34°)
    control_hz:            20.0   # Hz

    # Return-home trigger
    return_mode:                'threshold'  # 'threshold' | 'prediction'
    low_battery_threshold:       0.25        # fraction 0–1  (threshold mode only)
    prediction_cruise_fraction:  0.6         # fraction of max_linear assumed for travel
    prediction_turn_fraction:    0.3         # fraction of max_angular assumed for turns
    safety_margin_ah:            0.05        # Ah flat buffer added to predicted cost