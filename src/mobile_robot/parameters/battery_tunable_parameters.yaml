battery_node:
  ros__parameters:
    # Battery
    battery_capacity_ah: 1.0
    idle_drain_a: 1.0
    move_drain_per_ms: 10.0
    turn_drain_per_rads: 5.0
    battery_voltage: 12.0
    publish_rate_hz: 10.0

    # Charging
    charge_rate_a: 20.0
    charging_radius: 0.5
    stationary_thresh: 0.05

    # Charging station visual colors [r, g, b, a]
    # NOTE: ROS2 params require sequences to be the same type.
    #       So use 0.0 / 1.0 (floats) instead of 0 / 1 (ints) in lists.
    color_idle:
      ambient:  [0.0, 0.8, 0.0, 1.0]
      diffuse:  [0.0, 0.0, 0.0, 1.0]
      specular: [0.0, 0.0, 0.0, 1.0]

    color_charging:
      ambient:  [0.0, 0.0, 0.9, 1.0]
      diffuse:  [0.0, 0.0, 0.9, 1.0]
      specular: [0.0, 0.0, 0.9, 1.0]

    color_full:
      ambient:  [0.0, 0.4, 0.4, 0.2]
      diffuse:  [0.0, 0.9, 0.9, 0.2]
      specular: [0.0, 1.0, 1.0, 1.0]

    # Charging station positions [[x1,y1], [x2,y2], ...]
    charging_stations:
      - [-9.0, 0.0]
      - [9.0, 0.0]


auto_recharge_node:
  ros__parameters:
    low_battery_threshold: 0.15   # fraction (0–1); start homing below this
    arrived_radius:        0.25   # m  — slightly < charging_radius
    max_linear:            5.0    # m/s — maximum forward speed
    max_angular:           5.0    # rad/s — maximum rotation speed
    k_linear:              0.4    # proportional gain: forward speed
    k_angular:             1.6    # proportional gain: rotation speed
    turn_only_angle:       0.25   # rad (~14°) — align before driving
    drive_angle:           0.40   # rad (~23°) — re-enter turn mode if exceeded
    control_hz:            20.0   # Hz — control loop rate