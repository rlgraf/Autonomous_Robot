# ─────────────────────────────────────────────────────────────────────────────
# Soft Obstacle Avoidance Parameters
# Used by soft_obstacle_avoidance_node
#
# Tuning guide:
#   trigger_distance  – obstacle must be closer than this to interrupt navigation
#   clear_distance    – obstacle must reach this distance before navigation resumes
#                       (clear > trigger creates hysteresis, prevents flickering)
#   forward_arc_deg   – only lidar points within +/- this angle from dead-ahead
#                       are checked; keeps the node from reacting to side walls
#   avoid_angular_spd – rotation speed while turning away from obstacle (rad/s)
#   avoid_linear_spd  – forward nudge speed after rotating clear (m/s)
#   avoid_linear_dist – how far to nudge forward before handing back to navigator (m)
#   min_range         – ignore lidar returns closer than this (sensor self-noise)
#   max_range         – ignore lidar returns farther than this (distant clutter)
#   control_hz        – safety loop rate; keep >= 20 for responsive avoidance
# ─────────────────────────────────────────────────────────────────────────────
soft_obstacle_avoidance_node:
  ros__parameters:
    trigger_distance:   0.55   # m
    clear_distance:     0.95   # m   (must be > trigger_distance)
    forward_arc_deg:    30.0   # degrees +/- from robot heading
    avoid_angular_spd:  0.35   # rad/s
    avoid_linear_spd:   0.10  # m/s
    avoid_linear_dist:  0.45   # m
    min_range:          0.10   # m
    max_range:          8.0    # m
    control_hz:         25.0   # Hz
    
    # Anti-stuck behavior parameters
    max_avoid_sec:          8.0   # hard cap for AVOIDING time
    no_progress_sec:        2.5   # if range doesn't improve for this long -> release
    progress_epsilon_m:     0.05  # improvement threshold (meters)
    release_cooldown_sec:   1.0   # ignore triggers briefly after releasing
    