# ─────────────────────────────────────────────────────────────────────────────
# Soft Obstacle Avoidance Parameters
# Used by soft_obstacle_avoidance_node
#
# Tuning guide:
#   trigger_distance  – obstacle must be closer than this to interrupt navigation
#   clear_distance    – obstacle must reach this distance before navigation resumes
#                       (clear > trigger creates hysteresis, prevents flickering)
#   forward_arc_deg   – only lidar points within ±this angle from dead-ahead
#                       are checked; keeps the node from reacting to side walls
#   avoid_angular_spd – rotation speed while turning away from obstacle (rad/s)
#   avoid_linear_spd  – forward nudge speed after rotating clear (m/s)
#   avoid_linear_dist – how far to nudge forward before handing back (m)
#   min_range         – ignore lidar returns closer than this (sensor noise)
#   max_range         – ignore lidar returns farther than this (distant clutter)
#   control_hz        – safety loop rate; keep >= 20 for responsive avoidance
#
#   robot_width       – physical chassis width (m); used for flanking passthrough
#   wiggle_room       – extra per-side clearance beyond half robot-width (m)
#
#   station_nearness  – distance at which the robot is considered "approaching
#                       a charging station". Below this, avoidance is suppressed
#                       for obstacles that are FARTHER than the station itself,
#                       so walls/corners next to a station don't block docking.
# ─────────────────────────────────────────────────────────────────────────────
soft_obstacle_avoidance_node:
  ros__parameters:
    trigger_distance:   1.0   # m
    clear_distance:     1.25   # m   (must be > trigger_distance)
    forward_arc_deg:    70.0   # degrees +/- from robot heading
    avoid_angular_spd:  0.45   # rad/s
    avoid_linear_spd:   0.15   # m/s
    avoid_linear_dist:  0.40   # m
    min_range:          0.10   # m
    max_range:          8.0    # m
    control_hz:         20.0   # Hz

    # Flanking passthrough
    robot_width:        0.35   # m — physical chassis width
    wiggle_room:        0.10   # m — extra clearance per side

    # Station-proximity suppression
    station_nearness:   clear_distance   # m — suppress avoidance for far obstacles when
                               #     robot is closer than this to its target station